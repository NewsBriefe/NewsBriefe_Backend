services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: newsbrief
      POSTGRES_PASSWORD: newsbrief
      POSTGRES_DB: newsbrief
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsbrief"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - .:/app
    # FIX: --pool=solo prevents forking entirely.f
    # prefork (the default) forks child processes — asyncio event loops,
    # Semaphores, and gather() deadlock silently inside forked processes.
    # solo runs everything in a single process: no forking, asyncio works
    # correctly, and internal gather() concurrency still works within tasks.
    command: >
      celery -A app.workers.tasks.celery_app worker
      --loglevel=info
      --pool=solo
      --concurrency=1

  beat:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
    command: >
      celery -A app.workers.tasks.celery_app beat
      --loglevel=info
      --scheduler redbeat.RedBeatScheduler

  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      FLOWER_PORT: 5555
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
