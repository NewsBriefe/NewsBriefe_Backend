services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsbrief"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    # Persist data to disk every 60 seconds if at least 1 key changed
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - .:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
    volumes:
      - .:/app
    command: >
      celery -A app.workers.tasks.celery_app worker
      --loglevel=info
      --pool=solo

  beat:
    build: { context: ., dockerfile: Dockerfile }
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      - redis
    volumes:
      - .:/app
    command: >
      celery -A app.workers.tasks.celery_app beat
      --loglevel=info
      --scheduler redbeat.RedBeatScheduler

  flower:
    image: mher/flower:2.0
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      FLOWER_PORT: 5555
    ports:
      - "5555:5555"
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
